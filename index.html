document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

color:{{ t.iconColor }};line-height:0;\">{{ t.icon }}<\u002Fspan>{{ t.text }}\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1480,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = {\n      tab: 'verified',\n      q: '',\n      sel: { verified: {}, caller: {}, mobile: {} },\n      def: { verified: 1, caller: 11, mobile: 201 },\n      mq: '',\n      emails: [\n        { id:1, primary:'changsun.moon@mytrum.com', status:'Verified', updatedBy:'cs.moon', dateAdded:'May 14, 2025' },\n        { id:2, primary:'dslkjfsalkfi@ggmail.com', status:'Pending', updatedBy:'cs.moon', dateAdded:'Jun 17, 2026' },\n        { id:3, primary:'changsun.moon+898@mytrum.com', status:'Verified', updatedBy:'cs.moon', dateAdded:'Aug 25, 2025' },\n      ],\n      phones: [\n        { id:11, primary:'+1 (415) 555-0182', status:'Verified', updatedBy:'cs.moon', dateAdded:'Apr 02, 2025' },\n        { id:12, primary:'+1 (213) 555-0114', status:'Verified', updatedBy:'cs.moon', dateAdded:'Jun 10, 2026' },\n        { id:13, primary:'+1 (646) 555-0143', status:'Verified', updatedBy:'cs.moon', dateAdded:'Jul 19, 2025' },\n      ],\n      mobiles: [\n        { id:201, primary:'7146845111', status:'Verified', updatedBy:'cs.moon', dateAdded:'Aug 14, 2025' },\n        { id:202, primary:'5248648446', status:'Pending', updatedBy:'cs.moon', dateAdded:'Jun 18, 2026' },\n        { id:203, primary:'3102183499', status:'Pending', updatedBy:'cs.moon', dateAdded:'Sep 15, 2025' },\n      ],\n      modal: null,        // 'verified' | 'caller' | 'mobile' | null\n      closing: false,\n      country: 'USA',\n      field: '',\n      err: '',\n      toasts: [],\n      colW: { primary: 300, status: 200, updated: 220, date: 220, mprimary: 300, mstatus: 200, mupdated: 220, mdate: 220, pprimary: 300, pstatus: 200, pupdated: 220, pdate: 220 },\n      _nextId: 100,\n    };\n    this.headRef = (el) => { if (el) el.indeterminate = this._someChecked; };\n    this.mobHeadRef = (el) => { if (el) el.indeterminate = this._mobSome; };\n    this.phoneHeadRef = (el) => { if (el) el.indeterminate = this._phoneSome; };\n  }\n\n  today(){\n    return new Date().toLocaleDateString('en-US', { month:'short', day:'2-digit', year:'numeric' });\n  }\n  fmtPhone(d){\n    const x = d.replace(/\\D/g,'').slice(0,10);\n    if (x.length < 4) return x;\n    if (x.length < 7) return `(${x.slice(0,3)}) ${x.slice(3)}`;\n    return `(${x.slice(0,3)}) ${x.slice(3,6)}-${x.slice(6)}`;\n  }\n\n  toast(text, kind){\n    const id = Math.random();\n    const ok = kind !== 'del';\n    const icon = ok\n      ? React.createElement('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},React.createElement('path',{d:'M20 6 9 17l-5-5'}))\n      : React.createElement('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},React.createElement('path',{d:'M3 6h18'}),React.createElement('path',{d:'M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6'}));\n    this.setState(s => ({ toasts: [...s.toasts, { id, text, icon, iconColor: ok ? '#54cc9d' : '#ff8e84' }] }));\n    setTimeout(() => this.setState(s => ({ toasts: s.toasts.filter(t => t.id !== id) })), 2800);\n  }\n\n  startResize(key, e){\n    e.preventDefault(); e.stopPropagation();\n    const startX = e.clientX;\n    const startW = this.state.colW[key];\n    const move = (ev) => {\n      const w = Math.max(90, startW + (ev.clientX - startX));\n      this.setState(s => ({ colW: { ...s.colW, [key]: w } }));\n    };\n    const up = () => {\n      window.removeEventListener('mousemove', move);\n      window.removeEventListener('mouseup', up);\n      document.body.style.cursor = ''; document.body.style.userSelect = '';\n    };\n    window.addEventListener('mousemove', move);\n    window.addEventListener('mouseup', up);\n    document.body.style.cursor = 'col-resize';\n    document.body.style.userSelect = 'none';\n  }\n  curKey(){ return this.state.tab === 'caller' ? 'caller' : 'verified'; }\n  curList(){ return this.curKey() === 'caller' ? this.state.phones : this.state.emails; }\n\n  filtered(){\n    const q = this.state.q.trim().toLowerCase();\n    const list = this.curList();\n    if (!q) return list;\n    return list.filter(r => r.primary.toLowerCase().includes(q));\n  }\n\n  toggleOne(id){\n    const k = this.curKey();\n    this.setState(s => {\n      const m = { ...s.sel[k] };\n      if (m[id]) delete m[id]; else m[id] = true;\n      return { sel: { ...s.sel, [k]: m } };\n    });\n  }\n  toggleAll(){\n    const k = this.curKey();\n    const rows = this.filtered();\n    const all = rows.length > 0 && rows.every(r => this.state.sel[k][r.id]);\n    this.setState(s => {\n      const m = { ...s.sel[k] };\n      if (all) rows.forEach(r => delete m[r.id]);\n      else rows.forEach(r => m[r.id] = true);\n      return { sel: { ...s.sel, [k]: m } };\n    });\n  }\n  setDefault(id){\n    const k = this.curKey();\n    this.setState(s => ({ def: { ...s.def, [k]: s.def[k] === id ? null : id } }));\n  }\n  selIds(){\n    const k = this.curKey();\n    return Object.keys(this.state.sel[k]).filter(id => this.state.sel[k][id]);\n  }\n  doDelete(){\n    const ids = this.selIds().map(Number);\n    if (!ids.length){ this.toast('Select rows first','del'); return; }\n    const k = this.curKey();\n    const listKey = k === 'caller' ? 'phones' : 'emails';\n    this.setState(s => ({\n      [listKey]: s[listKey].filter(r => !ids.includes(r.id)),\n      sel: { ...s.sel, [k]: {} },\n    }));\n    this.toast(`${ids.length} ${k === 'caller' ? 'number' : 'email'}${ids.length>1?'s':''} deleted`,'del');\n  }\n  doResend(){\n    if (!this.selIds().length){ this.toast('Select rows first','del'); return; }\n    this.toast(`Verification ${this.curKey()==='caller'?'call/SMS':'email'} resent`);\n  }\n\n  filteredMobiles(){\n    const q = this.state.mq.trim().toLowerCase();\n    const list = this.state.mobiles;\n    return q ? list.filter(r => r.primary.toLowerCase().includes(q)) : list;\n  }\n  toggleMobile(id){\n    this.setState(s => {\n      const m = { ...s.sel.mobile };\n      if (m[id]) delete m[id]; else m[id] = true;\n      return { sel: { ...s.sel, mobile: m } };\n    });\n  }\n  toggleAllMobile(){\n    const rows = this.filteredMobiles();\n    const all = rows.length > 0 && rows.every(r => this.state.sel.mobile[r.id]);\n    this.setState(s => {\n      const m = { ...s.sel.mobile };\n      if (all) rows.forEach(r => delete m[r.id]); else rows.forEach(r => m[r.id] = true);\n      return { sel: { ...s.sel, mobile: m } };\n    });\n  }\n  setMobileDefault(id){\n    this.setState(s => ({ def: { ...s.def, mobile: s.def.mobile === id ? null : id } }));\n  }\n  mobileSelIds(){\n    return Object.keys(this.state.sel.mobile).filter(id => this.state.sel.mobile[id]);\n  }\n  deleteMobiles(){\n    const ids = this.mobileSelIds().map(Number);\n    if (!ids.length){ this.toast('Select rows first','del'); return; }\n    this.setState(s => ({ mobiles: s.mobiles.filter(r => !ids.includes(r.id)), sel: { ...s.sel, mobile: {} } }));\n    this.toast(`${ids.length} mobile number${ids.length>1?'s':''} deleted`,'del');\n  }\n  filteredPhones(){\n    const q = (this.state.pq||'').trim().toLowerCase();\n    const list = this.state.phones;\n    return q ? list.filter(r => r.primary.toLowerCase().includes(q)) : list;\n  }\n  togglePhone(id){\n    this.setState(s => {\n      const m = { ...s.sel.caller };\n      if (m[id]) delete m[id]; else m[id] = true;\n      return { sel: { ...s.sel, caller: m } };\n    });\n  }\n  toggleAllPhone(){\n    const rows = this.filteredPhones();\n    const all = rows.length > 0 && rows.every(r => this.state.sel.caller[r.id]);\n    this.setState(s => {\n      const m = { ...s.sel.caller };\n      if (all) rows.forEach(r => delete m[r.id]); else rows.forEach(r => m[r.id] = true);\n      return { sel: { ...s.sel, caller: m } };\n    });\n  }\n  setPhoneDefault(id){\n    this.setState(s => ({ def: { ...s.def, caller: s.def.caller === id ? null : id } }));\n  }\n  phoneSelIds(){\n    return Object.keys(this.state.sel.caller).filter(id => this.state.sel.caller[id]);\n  }\n  deletePhones(){\n    const ids = this.phoneSelIds().map(Number);\n    if (!ids.length){ this.toast('Select rows first','del'); return; }\n    this.setState(s => ({ phones: s.phones.filter(r => !ids.includes(r.id)), sel: { ...s.sel, caller: {} } }));\n    this.toast(`${ids.length} number${ids.length>1?'s':''} deleted`,'del');\n  }\n  startCallTimer(){\n    clearTimeout(this._callTimer);\n    this._callTimer = setTimeout(() => { if (this.state.calling) this.setState({ ended: true }); }, 8000);\n  }\n  openAdd(kind){ clearTimeout(this._callTimer); this.setState({ modal: kind || this.curKey(), field:'', err:'', country:'USA', closing:false, calling:null, confirmOpen:false, code:'', codeErr:'', ended:false, verified:false }); }\n  closeAdd(){\n    if (this.state.closing) return;\n    this.setState({ closing: true });\n    setTimeout(() => this.setState({ modal: null, closing: false }), 500);\n  }\n  submitAdd(){\n    const k = this.state.modal;\n    const v = this.state.field.trim();\n    if (k === 'caller'){\n      const digits = v.replace(/\\D/g,'');\n      if (digits.length < 10){ this.setState({ err:'Enter a valid 10-digit phone number.' }); return; }\n      const cc = '+1';\n      const row = { id: this.state._nextId, primary:`${cc} ${this.fmtPhone(digits)}`, status:'Pending', updatedBy:'cs.moon', dateAdded:this.today() };\n      this.setState(s => ({ phones:[...s.phones,row], _nextId:s._nextId+1 }));\n      this.closeAdd();\n      this.toast('Phone number added — verification pending');\n    } else if (k === 'mobile'){\n      const digits = v.replace(/\\D/g,'');\n      if (!digits){ this.setState({ err:'This is required.' }); return; }\n      if (digits.length < 10){ this.setState({ err:'Enter a valid 10-digit mobile number.' }); return; }\n      const row = { id: this.state._nextId, primary:digits, status:'Pending', updatedBy:'cs.moon', dateAdded:this.today() };\n      this.setState(s => ({ mobiles:[...s.mobiles,row], _nextId:s._nextId+1 }));\n      this.closeAdd();\n      this.toast('Verification SMS sent');\n    } else {\n      if (!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(v)){ this.setState({ err:'Enter a valid email address.' }); return; }\n      const row = { id: this.state._nextId, primary:v, status:'Pending', updatedBy:'cs.moon', dateAdded:this.today() };\n      this.setState(s => ({ emails:[...s.emails,row], _nextId:s._nextId+1 }));\n      this.closeAdd();\n      this.toast('Verification email sent');\n    }\n  }\n\n  renderVals(){\n    const TABS = [\n      { id:'plan', label:'Plan Information' },\n      { id:'org', label:'Organization Profile' },\n      { id:'security', label:'Security Settings' },\n      { id:'api', label:'API Settings' },\n      { id:'notif', label:'Notifications' },\n      { id:'verified', label:'Verify Email, SMS, Voice' },\n    ];\n    const active = this.state.tab;\n    const tabs = TABS.map((t, i) => {\n      const on = t.id === active;\n      const base = `padding:14px 22px;font-size:15px;cursor:pointer;white-space:nowrap;text-align:left;transition:color .15s;border-top:2px solid ${on?'#1668E3':'transparent'};border-right:1px solid #eef1f5;${i===0?'border-left:1px solid #eef1f5;':''}`;\n      const style = on\n        ? `${base}color:#1668E3;font-weight:600;background:#eef1f5;margin-bottom:-1px;border-bottom:1px solid #eef1f5;`\n        : `${base}color:#16233a;font-weight:500;background:#fff;`;\n      return { id:t.id, label:t.label, style, onClick: () => this.setState({ tab: t.id, q:'' }) };\n    });\n\n    const k = this.curKey();\n    const isTableView = active === 'verified' || active === 'caller';\n    const isCaller = active === 'caller';\n    const rowsRaw = [...this.filtered()].sort((a,b) => new Date(b.dateAdded) - new Date(a.dateAdded));\n    const selMap = this.state.sel[k];\n    const allChecked = rowsRaw.length > 0 && rowsRaw.every(r => selMap[r.id]);\n    this._someChecked = rowsRaw.some(r => selMap[r.id]) && !allChecked;\n    const hasSel = this.selIds().length > 0;\n\n    const rows = rowsRaw.map(r => {\n      const isDef = this.state.def[k] === r.id;\n      const selected = !!selMap[r.id];\n      return {\n        ...r,\n        selected,\n        rowCls: selected ? 'row-hl row-sel' : 'row-hl',\n        statusColor: r.status === 'Verified' ? '#0f7a37' : '#b97608',\n        rowStyle: `display:flex;align-items:center;border-bottom:1px solid #eef1f5;transition:background .15s;width:max-content;min-width:100%;background:${selected?'#eef5ff':'#fff'};`,\n        trackBg: isDef ? '#1668E3' : '#d6dde6',\n        knobTf: isDef ? 'translateX(17px)' : 'translateX(0)',\n        onSelect: () => this.toggleOne(r.id),\n        onToggleDefault: () => this.setDefault(r.id),\n      };\n    });\n\n    const pageTitle = isCaller ? 'Voice Settings'\n      : active === 'verified' ? 'Verified Email & Mobile'\n      : TABS.find(t => t.id === active).label;\n\n    return {\n      tabs,\n      pageTitle,\n      isTableView,\n      isVerified: active === 'verified',\n      isOrg: active === 'org',\n      isPlaceholder: !isTableView && active !== 'org',\n      cardTitle: isCaller ? 'Voice Caller ID' : 'Email Addresses',\n      cardDesc: isCaller\n        ? 'To send a voice message, you must set a caller ID. All calls will be made from this number.'\n        : 'In order to use your email address, you need to verify it first. Once verified, it can be used in sending emails, workflow alert emails, etc.',\n      listLabel: isCaller ? 'Caller ID List' : 'Email Address List',\n      firstColLabel: isCaller ? 'Phone Number' : 'Email Address',\n      resendLabel: isCaller ? 'Resend Verification' : 'Resend Verification Email',\n      rows,\n      wPrimary: this.state.colW.primary + 'px',\n      wStatus: this.state.colW.status + 'px',\n      wUpdated: this.state.colW.updated + 'px',\n      wDate: this.state.colW.date + 'px',\n      rz: {\n        primary: (e) => this.startResize('primary', e),\n        status: (e) => this.startResize('status', e),\n        updated: (e) => this.startResize('updated', e),\n        date: (e) => this.startResize('date', e),\n      },\n      selCount: this.selIds().length,\n      actionColor: hasSel ? '#16233a' : '#b9c3cf',\n      allChecked,\n      headRef: this.headRef,\n      onToggleAll: () => this.toggleAll(),\n      onResend: () => this.doResend(),\n      onDelete: () => this.doDelete(),\n      query: this.state.q,\n      onQuery: (e) => this.setState({ q: e.target.value }),\n      openAdd: () => this.openAdd(),\n\n      modalOpen: !!this.state.modal,\n      drawerAnim: this.state.closing ? 'drawerout .5s cubic-bezier(.2,.8,.2,1) forwards' : 'drawerin .5s cubic-bezier(.2,.8,.2,1)',\n      overlayAnim: this.state.closing ? 'none' : 'ovfade .18s ease',\n      isPhoneModal: this.state.modal === 'caller',\n      isEmailModal: this.state.modal === 'verified',\n      isMobileModal: this.state.modal === 'mobile',\n      modalTitle: this.state.modal === 'caller' ? 'Add a Caller ID'\n        : this.state.modal === 'mobile' ? 'Add Mobile Number'\n        : 'Add Email Address',\n      modalDesc: this.state.modal === 'caller'\n        ? 'Add a phone number to register as a Caller ID.'\n        : this.state.modal === 'mobile'\n        ? 'Add a mobile number to verify and use.'\n        : 'Add an email address to verify and use.',\n      modalHint: this.state.modal === 'caller'\n        ? 'We’ll call this phone number to verify that you own it. This number will be displayed as your Caller ID information.'\n        : this.state.modal === 'mobile'\n        ? 'A verification SMS will be sent to this number. It stays Pending until verified.'\n        : 'A verification link will be sent to this address. It stays Pending until verified.',\n      submitLabel: this.state.modal === 'caller' ? 'Send & Add' : 'Send Verification',\n      showSubmit: this.state.modal === 'verified' || this.state.modal === 'mobile',\n      country: this.state.country,\n      countryCode: { Canada:'+1', USA:'+1' }[this.state.country] || '+1',\n      onCountry: (e) => this.setState({ country: e.target.value }),\n      onCall: () => {\n        const digits = this.state.field.replace(/\\D/g,'');\n        if (!digits){ this.setState({ err:'This is required.' }); return; }\n        if (digits.length < 10){ this.setState({ err:'Enter a valid 10-digit phone number.' }); return; }\n        this.setState({ confirmOpen: true });\n      },\n      confirmOpen: !!this.state.confirmOpen,\n      confirmCancel: () => this.setState({ confirmOpen: false }),\n      confirmOk: () => {\n        const digits = this.state.field.replace(/\\D/g,'');\n        this.setState({ confirmOpen: false, calling: `+1 ${this.fmtPhone(digits)}`, ended: false });\n        this.startCallTimer();\n      },\n      calling: this.state.calling,\n      callingNumber: this.state.calling,\n      callActive: !!this.state.calling && !this.state.ended && !this.state.verified,\n      callEnded: !!this.state.calling && !!this.state.ended && !this.state.verified,\n      verifiedOk: !!this.state.calling && !!this.state.verified,\n      showCode: !!this.state.calling && !this.state.verified,\n      callAgain: () => { this.setState({ ended: false, code:'', codeErr:'' }); this.startCallTimer(); },\n      disconnectCall: () => { clearTimeout(this._callTimer); this.setState({ ended: true }); },\n      inputDim: this.state.calling ? 'background:#f1f3f6;color:#aab4c0;border-color:#e4e9ef;pointer-events:none;cursor:not-allowed;' : '',\n      cancelCall: () => { clearTimeout(this._callTimer); this.setState({ calling: null, code:'', codeErr:'', ended:false, verified:false }); },\n      code: this.state.code || '',\n      onCode: (e) => this.setState({ code: e.target.value.replace(/\\D/g,'').slice(0,6), codeErr:'' }),\n      codeBorder: this.state.codeErr ? '#e0463b' : '#d6dde6',\n      codeErr: this.state.codeErr || '',\n      codeErrStyle: this.state.codeErr ? 'font-size:12px;color:#b3271c;margin-top:8px;' : 'display:none;',\n      onVerify: () => {\n        const code = (this.state.code || '');\n        if (!code){ this.setState({ codeErr:'This is required.' }); return; }\n        if (code !== '123456'){ this.setState({ codeErr:'Verification Code is incorrect, please retry.' }); return; }\n        const digits = this.state.field.replace(/\\D/g,'');\n        const row = { id: this.state._nextId, primary:`+1 ${this.fmtPhone(digits)}`, status:'Verified', updatedBy:'cs.moon', dateAdded:this.today() };\n        clearTimeout(this._callTimer);\n        this.setState(s => ({ phones:[...s.phones,row], _nextId:s._nextId+1, verified:true, ended:false, codeErr:'' }));\n        this.toast('Caller ID verified and added');\n      },\n      field: this.state.field,\n      onField: (e) => {\n        let v = e.target.value;\n        if (this.state.modal === 'caller') v = this.fmtPhone(v);\n        else if (this.state.modal === 'mobile') v = v.replace(/\\D/g,'').slice(0,15);\n        this.setState({ field: v, err:'' });\n      },\n      fieldBorder: this.state.err ? '#e0463b' : '#d6dde6',\n      errText: this.state.err,\n      errStyle: this.state.err ? 'font-size:12px;color:#b3271c;margin-top:8px;' : 'display:none;',\n      closeAdd: () => this.closeAdd(),\n      submitAdd: () => this.submitAdd(),\n      stop: (e) => e.stopPropagation(),\n\n      toasts: this.state.toasts,\n      ...this.mobileVals(),\n      ...this.phoneVals(),\n    };\n  }\n\n  phoneVals(){\n    const rowsRaw = [...this.filteredPhones()].sort((a,b) => new Date(b.dateAdded) - new Date(a.dateAdded));\n    const selMap = this.state.sel.caller;\n    const allChecked = rowsRaw.length > 0 && rowsRaw.every(r => selMap[r.id]);\n    this._phoneSome = rowsRaw.some(r => selMap[r.id]) && !allChecked;\n    const hasSel = this.phoneSelIds().length > 0;\n    const rows = rowsRaw.map(r => {\n      const isDef = this.state.def.caller === r.id;\n      const selected = !!selMap[r.id];\n      return {\n        ...r,\n        selected,\n        rowCls: selected ? 'row-hl row-sel' : 'row-hl',\n        statusColor: r.status === 'Verified' ? '#0f7a37' : '#b97608',\n        rowStyle: `display:flex;align-items:center;border-bottom:1px solid #eef1f5;transition:background .15s;width:max-content;min-width:100%;background:${selected?'#eef5ff':'#fff'};`,\n        trackBg: isDef ? '#1668E3' : '#d6dde6',\n        knobTf: isDef ? 'translateX(17px)' : 'translateX(0)',\n        onSelect: () => this.togglePhone(r.id),\n        onToggleDefault: () => this.setPhoneDefault(r.id),\n      };\n    });\n    return {\n      phRows: rows,\n      phSelCount: this.phoneSelIds().length,\n      phActionColor: hasSel ? '#16233a' : '#b9c3cf',\n      phAllChecked: allChecked,\n      phHeadRef: this.phoneHeadRef,\n      phToggleAll: () => this.toggleAllPhone(),\n      phDelete: () => this.deletePhones(),\n      phQuery: this.state.pq || '',\n      phOnQuery: (e) => this.setState({ pq: e.target.value }),\n      phOpenAdd: () => this.openAdd('caller'),\n      pwPrimary: this.state.colW.pprimary + 'px',\n      pwStatus: this.state.colW.pstatus + 'px',\n      pwUpdated: this.state.colW.pupdated + 'px',\n      pwDate: this.state.colW.pdate + 'px',\n      prz: {\n        primary: (e) => this.startResize('pprimary', e),\n        status: (e) => this.startResize('pstatus', e),\n        updated: (e) => this.startResize('pupdated', e),\n        date: (e) => this.startResize('pdate', e),\n      },\n    };\n  }\n\n  mobileVals(){\n    const rowsRaw = [...this.filteredMobiles()].sort((a,b) => new Date(b.dateAdded) - new Date(a.dateAdded));\n    const selMap = this.state.sel.mobile;\n    const allChecked = rowsRaw.length > 0 && rowsRaw.every(r => selMap[r.id]);\n    this._mobSome = rowsRaw.some(r => selMap[r.id]) && !allChecked;\n    const hasSel = this.mobileSelIds().length > 0;\n    const rows = rowsRaw.map(r => {\n      const isDef = this.state.def.mobile === r.id;\n      const selected = !!selMap[r.id];\n      return {\n        ...r,\n        selected,\n        rowCls: selected ? 'row-hl row-sel' : 'row-hl',\n        statusColor: r.status === 'Verified' ? '#0f7a37' : '#b97608',\n        rowStyle: `display:flex;align-items:center;border-bottom:1px solid #eef1f5;transition:background .15s;width:max-content;min-width:100%;background:${selected?'#eef5ff':'#fff'};`,\n        trackBg: isDef ? '#1668E3' : '#d6dde6',\n        knobTf: isDef ? 'translateX(17px)' : 'translateX(0)',\n        onSelect: () => this.toggleMobile(r.id),\n        onToggleDefault: () => this.setMobileDefault(r.id),\n      };\n    });\n    return {\n      mobRows: rows,\n      mobSelCount: this.mobileSelIds().length,\n      mobActionColor: hasSel ? '#16233a' : '#b9c3cf',\n      mobAllChecked: allChecked,\n      mobHeadRef: this.mobHeadRef,\n      mobToggleAll: () => this.toggleAllMobile(),\n      mobDelete: () => this.deleteMobiles(),\n      mobQuery: this.state.mq,\n      mobOnQuery: (e) => this.setState({ mq: e.target.value }),\n      mobOpenAdd: () => this.openAdd('mobile'),\n      mwPrimary: this.state.colW.mprimary + 'px',\n      mwStatus: this.state.colW.mstatus + 'px',\n      mwUpdated: this.state.colW.mupdated + 'px',\n      mwDate: this.state.colW.mdate + 'px',\n      mrz: {\n        primary: (e) => this.startResize('mprimary', e),\n        status: (e) => this.startResize('mstatus', e),\n        updated: (e) => this.startResize('mupdated', e),\n        date: (e) => this.startResize('mdate', e),\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
